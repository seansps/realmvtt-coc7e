<script>
  function onDrop(type, recordLink) {
    if (type === "items") {
      onDropItem(recordLink);
    }
  }

  function onDropItem(recordLink) {
    const item = recordLink?.value;
    if (!item) return;

    const isAmmo = item?.data?.type === "ammunition";
    let unitCount = item.data?.count || 1;
    if (isAmmo && unitCount === 1) {
      unitCount = item.data?.rounds || 1;
    }

    const itemToAdd = {
      ...item,
      icon: "IconBox",
      data: {
        ...item?.data,
        fromId: item._id,
        count: unitCount,
        carried: "carried",
      },
    };

    const items = record?.data?.inventory || [];
    const index = items.findIndex((i) => i.data?.fromId === item._id);

    if (item.data?.type === "pack") {
      const itemsInPack = item.data?.items || [];
      const valuesToSet = {};

      if (item.data?.packCash) {
        valuesToSet["data.cash"] =
          (record?.data?.cash || "") +
          (record?.data?.cash ? " + " : "") +
          item.data.packCash;
      }

      const itemsToAdd = itemsInPack
        .map((packItem) => {
          const thisIndex = items.findIndex(
            (i) => i.data?.fromId === packItem._id,
          );
          const existingItem = thisIndex !== -1 ? items[thisIndex] : undefined;
          let itemCount = parseFloat(packItem?.data?.count || "0") || 1;
          const packItemIsAmmo = packItem.data?.type === "ammunition";
          if (packItemIsAmmo) {
            itemCount = itemCount * (packItem.data?.rounds || 1);
          }
          const curCount = parseFloat(existingItem?.data?.count || "0");
          if (!existingItem) {
            return {
              ...packItem,
              icon: "IconBox",
              data: {
                ...packItem.data,
                fromId: packItem._id,
                count: itemCount,
                carried: "carried",
              },
            };
          } else {
            valuesToSet[`data.inventory.${thisIndex}.data.count`] =
              curCount + itemCount;
          }
        })
        .filter((i) => i);

      api.addValues("data.inventory", itemsToAdd, () => {
        if (Object.keys(valuesToSet).length > 0) {
          api.setValues(valuesToSet);
        }
      });

      api.showNotification(
        `Unpacked ${itemsInPack.length} item${itemsInPack.length !== 1 ? "s" : ""} from ${item.name}.`,
        "green",
        "Item Pack",
      );
    } else {
      const existingItem = index !== -1 ? items[index] : undefined;
      if (existingItem) {
        const count = parseFloat(existingItem.data?.count || "0");
        let addCount = parseFloat(item.data?.count || "1");
        if (isAmmo && addCount === 1) {
          addCount = existingItem.data?.rounds || 1;
        }
        api.setValue(`data.inventory.${index}.data.count`, count + addCount);
      } else {
        api.addValue("data.inventory", itemToAdd);
      }
    }
  }
</script>

  <!-- Header row -->
