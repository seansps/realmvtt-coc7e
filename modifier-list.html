<script>
  function onModifierTypeChange(value) {
    const modPath = dataPath.replace(".data.type", "");
    const noValueTypes = [
      "bonusDie",
      "penaltyDie",
      "immuneToMajorWound",
      "immuneToImpale",
    ];
    const noField = ["immuneToMajorWound", "immuneToImpale"];
    const isDamage = value === "damageBonus" || value === "damagePenalty";
    const needsValue = !noValueTypes.includes(value);
    const needsField = !noField.includes(value);

    api.setValues({
      [`${modPath}.fields.value.hidden`]: !needsValue,
      [`${modPath}.fields.valueType.hidden`]: !needsValue,
      [`${modPath}.fields.fieldFreeText.hidden`]: isDamage || !needsField,
      [`${modPath}.fields.fieldDropdown.hidden`]: !isDamage || !needsField,
      [`${modPath}.fields.active.hidden`]: false,
      [`${modPath}.fields.itemOnly.hidden`]: false,
    });
  }
</script>

<div
  style="
    display: flex;
    flex-direction: row;
    gap: 4px;
    align-items: center;
    flex-wrap: wrap;
  "
>
  <dropdown
    field="type"
    label="Type"
    size="xs"
    width="140px"
    placeholder="Modifier type..."
    onchange="onModifierTypeChange(value)"
    options='[
      {"label": "Skill Bonus", "value": "skillBonus"},
      {"label": "Skill Penalty", "value": "skillPenalty"},
      {"label": "Damage Bonus", "value": "damageBonus"},
      {"label": "Damage Penalty", "value": "damagePenalty"},
      {"label": "Armor Bonus", "value": "armorBonus"},
      {"label": "SAN Bonus", "value": "sanBonus"},
      {"label": "SAN Penalty", "value": "sanPenalty"},
      {"label": "Stat Bonus", "value": "statBonus"},
      {"label": "Stat Penalty", "value": "statPenalty"},
      {"label": "Bonus Die", "value": "bonusDie"},
      {"label": "Penalty Die", "value": "penaltyDie"},
      {"label": "Immune: Major Wound", "value": "immuneToMajorWound"},
      {"label": "Immune: Impale", "value": "immuneToImpale"}
    ]'
  ></dropdown>

  <!-- Free-text field for skill/stat/bonusDie modifiers -->
  <box field="fieldFreeText">
    <stringfield
      field="field"
      label="Field"
      size="xs"
      width="120px"
      placeholder="skill/stat/all"
    ></stringfield>
  </box>

  <!-- Dropdown for damageBonus/damagePenalty -->
  <box field="fieldDropdown" hidden="true">
    <dropdown
      field="field"
      label="Applies To"
      size="xs"
      width="120px"
      options='[
        {"label": "All Attacks", "value": "all"},
        {"label": "Melee Only", "value": "melee"},
        {"label": "Ranged Only", "value": "ranged"}
      ]'
    ></dropdown>
  </box>

  <dropdown
    field="valueType"
    label="Value Type"
    size="xs"
    width="90px"
    options='[
      {"label": "Number", "value": "number"},
      {"label": "String", "value": "string"}
    ]'
  ></dropdown>

  <stringfield
    field="value"
    label="Value"
    size="xs"
    width="60px"
    placeholder="0"
  ></stringfield>

  <checkbox field="active" label="Active" size="xs"></checkbox>

  <checkbox field="itemOnly" label="Item Only" size="xs"></checkbox>
</div>
