<script>
  function onCarriedChange(value) {
    // Add/remove equip effect if the item has one
    const itemDataPath = getNearestParentDataPath(dataPath);
    const equipEffect = itemDataPath
      ? api.getValue(`${itemDataPath}.data.equipEffect`)
      : record?.data?.equipEffect;

    if (equipEffect) {
      const effect = JSON.parse(equipEffect);
      const effectId = effect?._id || "";
      const ourToken = api.getToken();
      if (effectId && ourToken) {
        if (value === "equipped") {
          api.addEffectById(effectId, ourToken);
        } else {
          api.removeEffectById(effectId, ourToken);
        }
      }
    }

    // When equip status changes, recalc stat modifiers
    // Fetch fresh record to pick up the new carried value
    api.getRecord(record.recordType, record._id, (freshRecord) => {
      const fieldsToSet = {};
      recalcStatModifiers(fieldsToSet, freshRecord);
      if (Object.keys(fieldsToSet).length > 0) {
        api.setValues(fieldsToSet);
      }
    });
  }

  function onCountChange(value) {
    const itemDataPath = getNearestParentDataPath(dataPath);
    const item = itemDataPath ? api.getValue(itemDataPath) : null;
    if (!item) return;

    const isAmmo = item.data?.type === "ammunition";
    if (!isAmmo) return;

    // Sync count to all attack entries using this ammo item
    const valuesToSet = {};
    const attacks = record?.data?.attacks || [];
    attacks.forEach((atk, index) => {
      if (atk.data?.ammoSelect === item._id) {
        valuesToSet[`data.attacks.${index}.data.currentAmmo`] = value;
      }
    });

    if (Object.keys(valuesToSet).length > 0) {
      api.setValues(valuesToSet);
    }
  }
</script>

<!-- Inventory Item Row -->
<div
  style="
    display: flex;
    flex-direction: row;
    gap: 4px;
    align-items: center;
    min-width: 100px;
  "
>
  <!-- Portrait -->
  <div style="width: 28px; min-width: 28px">
    <portrait width="28px" height="28px" field="portrait"></portrait>
  </div>

  <!-- Item Name -->
  <div style="min-width: 140px; flex: 1">
    <namefield
      placeholder="Item..."
      size="xs"
      width="100%"
      field="name"
      variant="unstyled"
      bold="true"
    ></namefield>
  </div>

  <!-- Quantity -->
  <numberfield
    placeholder="1"
    size="xs"
    field="count"
    width="50px"
    label="Quantity"
    variant="tooltip"
    textalign="center"
    onchange="onCountChange(value)"
  ></numberfield>

  <!-- Carried -->
  <dropdown
    field="carried"
    size="xs"
    width="90px"
    options='[
      {"label": "Carried", "value": "carried"},
      {"label": "Equipped", "value": "equipped"},
      {"label": "Stored", "value": "stored"}
    ]'
    onchange="onCarriedChange(value)"
  ></dropdown>
</div>
