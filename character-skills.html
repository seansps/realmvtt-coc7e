<script>
  function onRestoreMissingSkills() {
    api.getRecord(record.recordType, record._id, (freshRecord) => {
      restoreMissingSkills(freshRecord);
    });
  }

  function onImproveSkills() {
    // Roll improvement checks for all skills with the checked mark
    const skills = record?.data?.skills || [];
    let rollCount = 0;

    for (let i = 0; i < skills.length; i++) {
      const skill = skills[i];

      // Check specializations first
      const specs = skill.data?.specializations || [];
      for (let j = 0; j < specs.length; j++) {
        if (specs[j].data?.checked && !specs[j].data?.noImprovement) {
          const specValue = parseInt(specs[j].data?.value, 10) || 0;
          api.promptRoll(
            `Improve: ${specs[j].name}`,
            "1d100 default",
            [],
            {
              skillName: specs[j].name,
              skillValue: specValue,
              skillIndex: i,
              specIndex: j,
              isSpecialization: true,
            },
            "improvement"
          );
          rollCount++;
        }
      }

      // Check the main skill (only if it doesn't have specializations)
      if (skill.data?.checked && !skill.data?.noImprovement && !skill.data?.hasSpecializations) {
        const skillValue = parseInt(skill.data?.value, 10) || 0;
        api.promptRoll(
          `Improve: ${skill.name}`,
          "1d100 default",
          [],
          {
            skillName: skill.name,
            skillValue: skillValue,
            skillIndex: i,
            isSpecialization: false,
          },
          "improvement"
        );
        rollCount++;
      }
    }

    if (rollCount === 0) {
      api.showNotification("No skills are marked for improvement.", "yellow", "Improvement");
    }
  }
</script>

<div style="display: flex; flex-direction: column; gap: 4px; padding: 4px">
  <!-- Header Row -->
  <div
    style="
      display: flex;
      flex-direction: row;
      gap: 4px;
      align-items: center;
      padding: 0 4px;
    "
  >
    <div style="width: 24px"></div>
    <div style="min-width: 140px; flex: 1">
      <label variant="bold" size="sm" label="Skill"></label>
    </div>
    <div
      style="
        display: flex;
        flex-direction: row;
        gap: 2px;
        margin-left: auto;
      "
    >
      <div style="width: 42px; text-align: center">
        <label variant="bold" size="xs" label="Value"></label>
      </div>
      <div style="width: 36px; text-align: center">
        <label variant="bold" size="xs" label="Half"></label>
      </div>
      <div style="width: 36px; text-align: center">
        <label variant="bold" size="xs" label="Fifth"></label>
      </div>
      <div style="width: 36px"></div>
    </div>
  </div>

  <divider size="xs"></divider>

  <!-- Skill List -->
  <list
    listtype="skill_list"
    field="skills"
    variant="striped"
    height="100%"
  ></list>

  <divider size="xs"></divider>

  <div style="display: flex; flex-direction: row; gap: 8px">
    <iconbutton
      field="improveSkillsBtn"
      size="md"
      variant="default"
      options='[{"icon": "IconArrowUp", "label": "Improve Checked Skills", "value": "improve"}]'
      onclick="onImproveSkills()"
    ></iconbutton>
    <iconbutton
      field="restoreSkillsBtn"
      size="md"
      variant="default"
      options='[{"icon": "IconRefresh", "label": "Restore Missing Skills", "value": "restore"}]'
      onclick="onRestoreMissingSkills()"
    ></iconbutton>
  </div>
</div>
