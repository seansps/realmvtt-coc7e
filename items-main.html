<script>
  function showHideFields(typeOverride) {
    const itemDataPath = getNearestParentDataPath(dataPath);
    const item = itemDataPath ? api.getValue(itemDataPath) : record;
    const fieldsPath = itemDataPath ? `${itemDataPath}.fields` : "fields";

    const type = typeOverride || item?.data?.type || "gear";
    const isWeapon = type === "weapon";
    const isArmor = type === "armor";
    const isTome = type === "tome";
    const isArtifact = type === "artifact";
    const isAmmo = type === "ammunition";
    const isPack = type === "pack";

    const desired = {
      // Weapon fields
      damage: !isWeapon,
      range: !isWeapon,
      attacksPerRound: !isWeapon,
      ammo: !isWeapon,
      malfunction: !isWeapon,
      skill: !isWeapon,
      era: !isWeapon,
      isMelee: !isWeapon,
      isImpaling: !isWeapon,
      // Armor fields
      armorValue: !isArmor,
      // Tome fields
      mythosGain: !isTome,
      sanCost: !isTome,
      studyTime: !isTome,
      tomeLanguage: !isTome,
      // Artifact fields
      artifactSanCost: !isArtifact,
      // Ammunition fields
      rounds: !isAmmo,
      // Pack fields
      packItems: !isPack,
      // Rules tab animation (weapon only — controlled via items-rules.html box)
      animationProps: !isWeapon,
    };

    const valuesToSet = {};
    for (const [field, hidden] of Object.entries(desired)) {
      if (item?.fields?.[field]?.hidden !== hidden) {
        valuesToSet[`${fieldsPath}.${field}.hidden`] = hidden;
      }
    }

    if (Object.keys(valuesToSet).length > 0) {
      api.setValues(valuesToSet);
    }
  }

  function onTypeChange(value) {
    showHideFields(value);
  }
</script>
