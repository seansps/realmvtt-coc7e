<script>
  function onLoad() {
    onTypeChange(record?.data?.type || "npc");
  }

  function onTypeChange(value) {
    const isNpc = value === "npc";
    const isCreature = value === "creature";
    const isVehicle = value === "vehicle";

    const valuesToSet = {
      // Characteristics hidden for vehicles
      "fields.characteristicsSection.hidden": isVehicle,
      // APP hidden for creatures
      "fields.app.hidden": isCreature,
      "fields.appHalf.hidden": isCreature,
      "fields.appFifth.hidden": isCreature,
      // EDU hidden for creatures and vehicles
      "fields.edu.hidden": isCreature || isVehicle,
      "fields.eduHalf.hidden": isCreature || isVehicle,
      "fields.eduFifth.hidden": isCreature || isVehicle,
      // Skills list hidden for vehicles
      "fields.npcSkills.hidden": isVehicle,
      // Creature-specific
      "fields.sanLoss.hidden": !isCreature,
      "fields.specialAbilities.hidden": !isCreature,
      // Vehicle-specific
      "fields.vehicleStats.hidden": !isVehicle,
      // Hide MP, DB/Build for vehicles
      "fields.mpGroup.hidden": isVehicle,
      "fields.dbGroup.hidden": isVehicle,
      // Hide attacks for vehicles
      "fields.vehicleAttacksSection.hidden": isVehicle,
    };

    // Hide Spells tab for vehicles (set only when needed to avoid loops)
    const currentSpellsHidden =
      record.tabs && record.tabs.Spells && record.tabs.Spells.hidden;
    if (isVehicle && !currentSpellsHidden) {
      valuesToSet["tabs.Spells.hidden"] = true;
    } else if (!isVehicle && currentSpellsHidden) {
      valuesToSet["tabs.Spells.hidden"] = false;
    }

    api.setValues(valuesToSet);
  }

  function onStatChange(value, stat) {
    const val = parseInt(value, 10);
    if (isNaN(val)) return;

    // Build a temporary record with the updated stat so recalcDerivedStats sees the new value
    const tempRec = { data: { ...(record?.data || {}) } };
    tempRec.data[stat] = val;

    const fieldsToSet = {};
    recalcDerivedStats(fieldsToSet, tempRec);

    // NPCs don't use SAN derived fields
    delete fieldsToSet["data.maxSan"];
    delete fieldsToSet["data.san"];

    // Ensure the typed value is set (recalcDerivedStats sets half/fifth via its own loop)
    fieldsToSet[`data.${stat}`] = val;

    api.setValues(fieldsToSet);
  }

  function rollNpcStat(stat) {
    const value = parseInt(record?.data?.[stat], 10) || 0;
    performCharacteristicRoll(record, stat, value);
  }

  function rollNpcInitiative() {
    const dex = parseInt(record?.data?.dex, 10) || 0;
    const useRoll = api.getSetting("rollInit") === "yes";
    const formula = useRoll ? "1d6 default" : `${dex}`;
    const modifiers = useRoll
      ? [{ name: "DEX", value: dex, active: true }]
      : [];
    const tooltip = useRoll
      ? "Initiative (1D6 + DEX)"
      : "Initiative (DEX Order)";
    if (record.linked === undefined) {
      api.promptRoll(
        "Roll/Set Initiative",
        formula,
        modifiers,
        { rollName: "Initiative", tooltip },
        "initiative",
      );
    } else {
      api.promptRollForToken(
        record,
        "Roll/Set Initiative",
        formula,
        modifiers,
        { rollName: "Initiative", tooltip },
        "initiative",
      );
    }
  }

  function onSanCheckClick() {
    const san = record?.data?.san;
    if (san === undefined) return;
    performSanityCheck(record, "0", "1D6");
  }
</script>
