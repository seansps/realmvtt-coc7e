
<div style="display: flex; flex-direction: column; gap: 8px; padding: 4px">
  <!-- Combat Header -->
  <label variant="bold" size="md" label="Weapons & Attacks"></label>

  <!-- Attacks List -->
  <list
    listtype="attack_list"
    field="inventory"
    variant="striped"
    height="100%"
  ></list>

  <divider size="xs"></divider>

  <!-- Quick Reference Stats -->
  <div
    style="
      display: flex;
      flex-direction: row;
      gap: 8px;
      flex-wrap: wrap;
      align-items: flex-end;
    "
  >
    <numberfield
      field="dodgeValue"
      label="Dodge"
      size="sm"
      width="52px"
      hidecontrols="true"
      textalign="center"
      editable="false"
    ></numberfield>
    <numberfield
      field="dodgeHalf"
      label="Dodge ½"
      size="sm"
      width="52px"
      hidecontrols="true"
      textalign="center"
      editable="false"
    ></numberfield>
    <numberfield
      field="dodgeFifth"
      label="Dodge ⅕"
      size="sm"
      width="52px"
      hidecontrols="true"
      textalign="center"
      editable="false"
    ></numberfield>
    <stringfield
      field="damageBonus"
      label="Dmg Bonus"
      size="sm"
      width="80px"
      editable="false"
    ></stringfield>
    <numberfield
      field="build"
      label="Build"
      size="sm"
      width="50px"
      hidecontrols="true"
      textalign="center"
      editable="false"
    ></numberfield>
    <numberfield
      field="armor"
      label="Armor"
      size="sm"
      width="50px"
      hidecontrols="true"
      textalign="center"
      minvalue="0"
    ></numberfield>
  </div>
</div>
