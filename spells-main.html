<div style="display: flex; flex-direction: column; gap: 8px; padding: 4px">
  <!-- Header: portrait + name area -->
  <div style="display: flex; gap: 8px; align-items: flex-start">
    <portrait width="72px" height="72px" field="portrait"></portrait>
    <div style="display: flex; flex-direction: column; gap: 4px; flex: 1">
      <div
        style="display: flex; flex-direction: row; gap: 8px; flex-wrap: wrap"
      >
        <numberfield
          field="mpCost"
          label="MP Cost"
          size="sm"
          width="70px"
          hidecontrols="true"
          textalign="center"
          placeholder="0"
        ></numberfield>
        <stringfield
          field="sanCost"
          label="SAN Cost"
          size="sm"
          width="70px"
          placeholder="0"
        ></stringfield>
        <numberfield
          field="powCost"
          label="POW Cost"
          size="sm"
          width="70px"
          hidecontrols="true"
          textalign="center"
          placeholder="0"
        ></numberfield>
        <stringfield
          field="castingTime"
          label="Casting Time"
          size="sm"
          width="90px"
          placeholder="1 round"
        ></stringfield>
        <stringfield
          field="damage"
          label="Damage"
          size="sm"
          width="70px"
          placeholder="1D6"
        ></stringfield>
      </div>
      <div
        style="
          display: flex;
          flex-direction: row;
          gap: 12px;
          flex-wrap: wrap;
          align-items: center;
        "
      >
        <checkbox field="opposedPow" label="Opposed POW" size="sm"></checkbox>
        <checkbox
          field="isMagical"
          label="Magical (ignores armor)"
          size="sm"
        ></checkbox>
      </div>
    </div>
  </div>

  <dropdown
    field="effects"
    label="Effects to Apply"
    size="sm"
    width="100%"
    searchable="true"
    multiselect="5"
    placeholder="Select effects..."
    optionsquery='{"type": "effects", "query": {}}'
  ></dropdown>

  <divider label="Description"></divider>
  <richtextfield
    field="description"
    placeholder="Describe the spell..."
    height="180px"
  ></richtextfield>

  <divider label="Deeper Magic"></divider>
  <richtextfield
    field="deeper"
    placeholder="Alternative or enhanced effects..."
    height="120px"
  ></richtextfield>
</div>
