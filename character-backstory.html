<script>
  function onDrop(type, recordLink) {
    if (type === "spells") {
      onDropSpell(recordLink);
    }
  }

  function onDropSpell(recordLink) {
    api.getRecord("spells", recordLink._id, (spellRecord) => {
      if (!spellRecord) return;

      const spellEntry = {
        _id: generateUuid(),
        name: spellRecord.name,
        unidentifiedName: spellRecord.name,
        recordType: "spell",
        identified: true,
        icon: "IconWand",
        data: {
          fromId: spellRecord._id,
          mpCost: spellRecord.data?.mpCost || 0,
          sanCost: spellRecord.data?.sanCost || "0",
          powCost: spellRecord.data?.powCost || 0,
          castingTime: spellRecord.data?.castingTime || "",
          description: spellRecord.data?.description || "",
        },
      };

      api.addValue("data.spells", spellEntry);
    });
  }
</script>
