<div style="display: flex; flex-direction: column; gap: 8px; padding: 4px">
  <label variant="bold" size="md" label="Backstory"></label>

  <stringfield
    field="personalDescription"
    label="Personal Description"
    placeholder="Appearance, mannerisms..."
    multiline="true"
  ></stringfield>
  <stringfield
    field="ideologyBeliefs"
    label="Ideology / Beliefs"
    placeholder="Religion, politics, superstitions..."
    multiline="true"
  ></stringfield>
  <stringfield
    field="significantPeople"
    label="Significant People"
    placeholder="Who matters most, and why..."
    multiline="true"
  ></stringfield>
  <stringfield
    field="meaningfulLocations"
    label="Meaningful Locations"
    placeholder="Places of special meaning..."
    multiline="true"
  ></stringfield>
  <stringfield
    field="treasuredPossessions"
    label="Treasured Possessions"
    placeholder="Valued objects and why..."
    multiline="true"
  ></stringfield>
  <stringfield
    field="traits"
    label="Traits"
    placeholder="Quirks, habits, mannerisms..."
    multiline="true"
  ></stringfield>
  <stringfield
    field="arcaneTomes"
    label="Arcane Tomes, Spells & Artifacts"
    placeholder="Occult knowledge encountered..."
    multiline="true"
  ></stringfield>
  <stringfield
    field="injuriesScars"
    label="Injuries & Scars"
    placeholder="Physical marks from past events..."
    multiline="true"
  ></stringfield>
  <stringfield
    field="phobiasManias"
    label="Phobias & Manias"
    placeholder="Irrational fears or compulsions..."
    multiline="true"
  ></stringfield>
  <stringfield
    field="encountersEntities"
    label="Encounters with Strange Entities"
    placeholder="Mythos contacts and encounters..."
    multiline="true"
  ></stringfield>

  <divider size="xs"></divider>

  <label variant="bold" size="sm" label="Notes"></label>
  <richtextfield
    field="notes"
    placeholder="Additional notes..."
    height="150px"
  ></richtextfield>

  <divider size="xs"></divider>

  <label variant="bold" size="md" label="Token Settings"></label>
  <div style="display: flex; flex-direction: row; gap: 8px; flex-wrap: wrap">
    <dropdown
      field="size"
      label="Token Size"
      size="sm"
      width="120px"
      placeholder="1 (Normal)"
      options='[
        {"label": "0.5 (Tiny)", "value": "0.5"},
        {"label": "0.75 (Small)", "value": "0.75"},
        {"label": "1 (Normal)", "value": "1"},
        {"label": "2 (Large)", "value": "2"},
        {"label": "3 (Huge)", "value": "3"},
        {"label": "4 (Enormous)", "value": "4"}
      ]'
    ></dropdown>
    <stringfield
      field="senses"
      label="Senses"
      size="sm"
      width="200px"
      placeholder="Senses..."
    ></stringfield>
  </div>
</div>
