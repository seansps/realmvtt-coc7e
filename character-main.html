<script>
  function onLoad() {
    // Populate default skills if the character has no skills yet
    const skills = record?.data?.skills || [];
    if (skills.length === 0) {
      const defaultSkills = populateDefaultSkills(record);
      const valuesToSet = {
        "data.skills": defaultSkills,
      };
      api.setValues(valuesToSet, () => {
        // After skills are set, recalc derived stats
        const statsToSet = {};
        recalcDerivedStats(statsToSet, record);
        if (Object.keys(statsToSet).length > 0) {
          api.setValues(statsToSet);
        }
      });
    } else {
      // Just recalc derived stats
      const statsToSet = {};
      recalcDerivedStats(statsToSet, record);
      if (Object.keys(statsToSet).length > 0) {
        api.setValues(statsToSet);
      }
    }
  }

  function onCharacteristicChange(value, stat) {
    const val = parseInt(value, 10);
    if (isNaN(val)) return;

    const fieldsToSet = {};
    fieldsToSet[`data.${stat}Base`] = val;
    fieldsToSet[`data.${stat}`] = val;
    fieldsToSet[`data.${stat}Half`] = getHalf(val);
    fieldsToSet[`data.${stat}Fifth`] = getFifth(val);

    // Recalc all derived stats with the new value
    api.setValues(fieldsToSet, () => {
      api.getRecord(record.recordType, record._id, (freshRecord) => {
        const derivedToSet = {};
        recalcDerivedStats(derivedToSet, freshRecord);

        // If DEX changed, update Dodge skill base value
        if (stat === "dex") {
          updateDodgeBase(freshRecord, derivedToSet);
        }
        // If EDU changed, update Language (Own) base value
        if (stat === "edu") {
          updateLanguageOwnBase(freshRecord, derivedToSet);
        }

        if (Object.keys(derivedToSet).length > 0) {
          api.setValues(derivedToSet);
        }
      });
    });
  }

  function onAgeChange(value) {
    const fieldsToSet = {};
    fieldsToSet["data.age"] = value;
    api.setValues(fieldsToSet, () => {
      api.getRecord(record.recordType, record._id, (freshRecord) => {
        const derivedToSet = {};
        recalcDerivedStats(derivedToSet, freshRecord);
        if (Object.keys(derivedToSet).length > 0) {
          api.setValues(derivedToSet);
        }
      });
    });
  }

  function onLuckChange(value) {
    const val = parseInt(value, 10);
    if (isNaN(val)) return;
    api.setValues({
      "data.luck": val,
      "data.luckHalf": getHalf(val),
      "data.luckFifth": getFifth(val),
    });
  }

  function updateDodgeBase(rec, fieldsToSet) {
    const dex = parseInt(rec?.data?.dex, 10) || 0;
    const dodgeBase = getHalf(dex);
    const skills = rec?.data?.skills || [];
    for (let i = 0; i < skills.length; i++) {
      if (skills[i].name === "Dodge") {
        fieldsToSet[`data.skills.${i}.data.baseValue`] = dodgeBase;
        // Only update value if it equals the old base (not manually modified)
        const currentBase = skills[i].data?.baseValue || 0;
        const currentValue = skills[i].data?.value || 0;
        const allocated = currentValue - currentBase;
        const newValue = dodgeBase + allocated;
        fieldsToSet[`data.skills.${i}.data.value`] = newValue;
        fieldsToSet[`data.skills.${i}.data.halfValue`] = getHalf(newValue);
        fieldsToSet[`data.skills.${i}.data.fifthValue`] = getFifth(newValue);
        fieldsToSet["data.dodgeValue"] = newValue;
        fieldsToSet["data.dodgeHalf"] = getHalf(newValue);
        fieldsToSet["data.dodgeFifth"] = getFifth(newValue);
        break;
      }
    }
  }

  function updateLanguageOwnBase(rec, fieldsToSet) {
    const edu = parseInt(rec?.data?.edu, 10) || 0;
    const skills = rec?.data?.skills || [];
    for (let i = 0; i < skills.length; i++) {
      if (skills[i].name === "Language (Own)") {
        fieldsToSet[`data.skills.${i}.data.baseValue`] = edu;
        const currentBase = skills[i].data?.baseValue || 0;
        const currentValue = skills[i].data?.value || 0;
        const allocated = currentValue - currentBase;
        const newValue = edu + allocated;
        fieldsToSet[`data.skills.${i}.data.value`] = newValue;
        fieldsToSet[`data.skills.${i}.data.halfValue`] = getHalf(newValue);
        fieldsToSet[`data.skills.${i}.data.fifthValue`] = getFifth(newValue);
        break;
      }
    }
  }

  function rollCharacteristic(stat) {
    const value = parseInt(record?.data?.[stat], 10) || 0;
    performCharacteristicRoll(record, stat, value);
  }

  function rollLuck() {
    const luck = parseInt(record?.data?.luck, 10) || 0;
    performSkillCheck(record, "Luck", luck, {
      isLuck: true,
      cannotPush: true,
    });
  }

  function onImproveLuck() {
    const luck = parseInt(record?.data?.luck, 10) || 0;
    if (luck >= 99) {
      api.showNotification(
        "Luck is already at maximum (99).",
        "yellow",
        "Luck",
      );
      return;
    }
    api.promptRoll(
      "Improve Luck",
      "1d100 default",
      [],
      {
        luckValue: luck,
        recordType: record.recordType,
        recordId: record._id,
      },
      "luckImprovement",
    );
  }

  function onSanCheckClick() {
    // Prompt the keeper for SAN loss values
    const options = [
      { label: "0/1", value: "0/1" },
      { label: "0/1D3", value: "0/1D3" },
      { label: "0/1D4", value: "0/1D4" },
      { label: "0/1D6", value: "0/1D6" },
      { label: "1/1D4+1", value: "1/1D4+1" },
      { label: "1/1D6", value: "1/1D6" },
      { label: "1/1D6+1", value: "1/1D6+1" },
      { label: "1/1D8", value: "1/1D8" },
      { label: "1/1D10", value: "1/1D10" },
      { label: "1D4/1D10", value: "1D4/1D10" },
      { label: "1D6/1D20", value: "1D6/1D20" },
      { label: "1D10/1D100", value: "1D10/1D100" },
    ];

    const callback = (values) => {
      if (!values || values.length === 0) return;
      const selected = values[0];
      const parts = selected.split("/");
      const sanLossSuccess = parts[0] || "0";
      const sanLossFailure = parts[1] || "0";
      performSanityCheck(record, sanLossSuccess, sanLossFailure);
    };

    api.showPrompt(
      "Sanity Check",
      "SAN Loss",
      "Select the SAN loss for this check (Success/Failure):",
      options,
      null,
      callback,
    );
  }

  function onDrop(type, recordLink) {
    if (type === "occupations") {
      onDropOccupation(recordLink);
    }
  }

  function onDropOccupation(recordLink) {
    // Use list-of-1 pattern: add the record to a list so it shows as a
    // clickable portrait link to the occupation record
    const occupations = record?.data?.occupations || [];
    const occupationObj = { ...recordLink.value };

    if (occupations.length > 0) {
      // Replace existing occupation
      api.removeValue("data.occupations", 0, () => {
        api.addValue("data.occupations", occupationObj);
      });
    } else {
      api.addValue("data.occupations", occupationObj);
    }

    // Unhide the occupations list and set the occupation name field
    api.setValues({
      "data.occupation": recordLink.tooltip || "",
      "fields.occupations.hidden": false,
    });
  }

  function onMajorWoundChange(value) {
    // Major wound applies a penalty die to physical actions
    // This is tracked in metadata during rolls
  }
</script>

            label="Max"
          ></numberfield>
          <div style="flex: 1; min-width: 60px">
            <progressbar
              field="mpBar"
              currentvaluefield="curMp"
              maxvaluefield="maxMp"
              color="violet"
              width="100%"
              height="100%"
              size="lg"
            ></progressbar>
          </div>
        </div>
      </div>

      <divider size="xs"></divider>

      <!-- Damage Bonus, Build, Move Rate -->
      <div
        style="
          display: flex;
          flex-direction: row;
          gap: 8px;
          flex-wrap: wrap;
          align-items: flex-end;
        "
      >
        <stringfield
          field="damageBonus"
          label="Damage Bonus"
          size="xs"
          width="100px"
          editable="false"
        ></stringfield>
        <numberfield
          field="build"
          label="Build"
          size="xs"
          width="60px"
          hidecontrols="true"
          textalign="center"
          editable="false"
        ></numberfield>
        <numberfield
          field="mov"
          label="Move Rate"
          size="xs"
          width="90px"
          hidecontrols="true"
          textalign="center"
          editable="false"
        ></numberfield>
      </div>
    </div>
  </div>
</div>
