<script>

  function onStep7Load() {
    // Nothing special needed

  function onStepEnd() {
    const valuesToSet = {};

    const fields = [
      "personalDescription",
      "ideologyBeliefs",
      "significantPeople",
      "meaningfulLocations",
      "treasuredPossessions",
      "traits",
    ];

    fields.forEach((field) => {
      const value = api.getValue(`data.wizard.${field}`) || "";
      if (value) {
        valuesToSet[`data.${field}`] = value;
      }
    });

    if (Object.keys(valuesToSet).length > 0) {
      api.setValues(valuesToSet);
    }
  }
</script>
