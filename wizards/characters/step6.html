<script>
  // Step 6: Personal Interest Skill Points
  // INT × 2 points to allocate to any non-Cthulhu Mythos skills

  function onStep6Load() {
    const intVal = parseInt(api.getValue("data.wizard.int"), 10) || 0;
    const totalPoints = intVal * 2;
    api.setValue("data.wizard.persSkillPointsTotal", totalPoints);
    recalcPersPoints();
  }

  function recalcPersPoints() {
    const total = parseInt(api.getValue("data.wizard.persSkillPointsTotal"), 10) || 0;
    let spent = 0;

    // Sum all personal interest allocations
    const allocations = api.getValue("data.wizard.persSkillAllocations") || {};
    for (const key in allocations) {
      spent += parseInt(allocations[key], 10) || 0;
    }

    const remaining = total - spent;
    api.setValue("data.wizard.persSkillPointsRemaining", remaining);
  }

  function onPersSkillAllocationChange(value, skillName) {
    const allocations = api.getValue("data.wizard.persSkillAllocations") || {};
    allocations[skillName] = parseInt(value, 10) || 0;
    api.setValue("data.wizard.persSkillAllocations", allocations);
    recalcPersPoints();
  }

  function onStepEnd() {
    // Apply personal interest skill allocations to character's skill list
    const allocations = api.getValue("data.wizard.persSkillAllocations") || {};

    api.getRecord("characters", record._id, (currentRecord) => {
      const skills = currentRecord?.data?.skills || [];
      const valuesToSet = {};

      for (const skillName in allocations) {
        const points = parseInt(allocations[skillName], 10) || 0;
        if (points <= 0) continue;

        for (let i = 0; i < skills.length; i++) {
          if (skills[i].name === skillName) {
            const currentValue = parseInt(skills[i].data?.value, 10) || 0;
            const newValue = currentValue + points;
            valuesToSet[`data.skills[${i}].data.value`] = newValue;
            valuesToSet[`data.skills[${i}].data.halfValue`] = getHalf(newValue);
            valuesToSet[`data.skills[${i}].data.fifthValue`] = getFifth(newValue);
            break;
          }
          // Check specializations
          const specs = skills[i].data?.specializations || [];
          for (let j = 0; j < specs.length; j++) {
            if (specs[j].name === skillName) {
              const currentValue = parseInt(specs[j].data?.value, 10) || 0;
              const newValue = currentValue + points;
              valuesToSet[`data.skills[${i}].data.specializations[${j}].data.value`] = newValue;
              valuesToSet[`data.skills[${i}].data.specializations[${j}].data.halfValue`] = getHalf(newValue);
              valuesToSet[`data.skills[${i}].data.specializations[${j}].data.fifthValue`] = getFifth(newValue);
              break;
            }
          }
        }
      }

      if (Object.keys(valuesToSet).length > 0) {
        api.setValues(valuesToSet);
      }
    });
  }
</script>

<div style="display: flex; flex-direction: column; gap: 8px; padding: 8px">

    <label size="sm" label="Remaining:"></label>
    <numberfield field="persSkillPointsRemaining" size="sm" width="60px" hidecontrols="true" textalign="center" editable="false"></numberfield>
  </div>
